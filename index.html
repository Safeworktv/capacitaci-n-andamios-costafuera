<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Capacitación SSPA: Montaje Seguro de Andamios</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <header class="training-header">
        <div class="header-left">
            <img src="assets/logo_pemex.png" alt="PEMEX" class="logo-inst">
            <div class="divider"></div>
            <div class="brand">
                <h1>SISTEMA DE ENTRENAMIENTO DE ANDAMIAJE</h1>
                <p>Cumplimiento Normativo SSPA / Ambiente Marino</p>
            </div>
        </div>
        <div class="phase-indicator">
            FASE ACTUAL: <span id="current-phase-name">Cargando...</span>
        </div>
    </header>

    <main class="training-layout">
        <section class="visual-engine">
            <div class="viewport-card">
                <div class="image-frame">
                    <img src="" id="guide-image" alt="Visualización Técnica">
                </div>
                <div class="instruction-overlay">
                    <h3 id="step-title">Cargando...</h3>
                    <p id="step-desc">Espere un momento.</p>
                </div>
            </div>
        </section>

        <aside class="control-panel">
            <div class="panel-section" id="compliance-section">
                <h3>PROTOCOLO DE SEGURIDAD</h3>
                <div id="checklist-container" class="checklist-v3">
                    </div>
                <button class="btn-next" id="btn-validate" onclick="nextStep()">VALIDAR Y CONTINUAR</button>
            </div>

            <div class="panel-section" id="evaluation-section" style="display: none;">
                <h3>EVALUACIÓN DE CERTIFICACIÓN</h3>
                <div class="quiz-container">
                    <p class="quiz-question" id="quiz-question-text">Pregunta</p>
                    <div class="quiz-options" id="quiz-options-container">
                        </div>
                </div>
            </div>

            <div class="panel-section tag-control">
                <h3>ESTADO DE TARJETA</h3>
                <div id="tag-display" class="tag-status status-roja">
                    <img src="assets/etiqueta_roja.jpg" alt="Tarjeta Roja" id="active-tag">
                    <p id="tag-note">ESTADO: NO SEGURO PARA USO</p>
                </div>
            </div>
        </aside>
    </main>

    <script src="script.js"></script>
</body>
</html>
