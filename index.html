<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Capacitación SSPA: Montaje en Plataforma</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <header class="main-header">
        <img src="assets/logo_pemex.png" alt="PEMEX" class="logo-inst">
        <div class="brand">
            <h1>ENTRENAMIENTO TÉCNICO DE ANDAMIAJE</h1>
            <p>Gerencia de Seguridad, Salud en el Trabajo y Protección Ambiental</p>
        </div>
        <div id="phase-badge" class="badge">FASE 1: INSPECCIÓN</div>
    </header>

    <main class="app-container">
        <section class="viewer">
            <div class="image-card">
                <img src="assets/paso0_inspeccion.png" id="main-image">
                <div class="instruction-box">
                    <h2 id="step-title">Inspección de Componentes</h2>
                    <p id="step-desc">Cargando instrucciones...</p>
                </div>
            </div>
            <div class="status-bar">
                <span class="tag-label">ETIQUETA ACTUAL:</span>
                <img src="assets/etiqueta_roja.jpg" id="current-tag" class="tag-icon">
                <span id="tag-text">NO SEGURO PARA USO</span>
            </div>
        </section>

        <aside class="checklist-panel">
            <h3>PUNTOS DE VERIFICACIÓN</h3>
            <div id="check-list" class="checks-container">
                </div>
            <button class="btn-next" onclick="validarPaso()">Confirmar y Siguiente Paso</button>
        </aside>
    </main>

    <script src="script.js"></script>
</body>
</html>
